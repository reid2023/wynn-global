<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <!-- 移动端视口配置，支持安全区域 (iPhone X+) -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, minimum-scale=1, user-scalable=no, shrink-to-fit=no"
    />
    <!-- iOS 应用配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wynn Global" />
    <!-- iOS Safari 兼容性 -->
    <meta name="apple-mobile-web-app-status-bar" content="black-translucent" />
    <!-- 防止页面缩放导致的布局问题 -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="format-detection" content="email=no" />
    <!-- 主题色 -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="Global Mobile Application" />
    <!-- PWA 配置 -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/img/icons/icon-192x192.png" />
    <!-- 防止页面缩放 CSS -->
    <link rel="stylesheet" href="/plugins/loading/loading.css" />
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      html {
        /* 防止在点击链接时出现双击缩放延迟 */
        -webkit-touch-callout: none;
        /* 禁用长按菜单 */
        -webkit-user-select: none;
        user-select: none;
      }

      /* iOS Safari 兼容性：防止缩放和长按菜单 */
      body * {
        -webkit-touch-callout: none;
        /* 允许输入框和按钮可以选择 */
        -webkit-user-select: text;
      }

      /* 防止 iOS Safari 在点击输入框时自动放大 */
      input,
      textarea,
      select,
      button {
        /* 关键：字体大小必须 ≥ 16px，否则 iOS Safari 会自动放大 */
        font-size: 16px;
        /* 禁用双击缩放 */
        touch-action: manipulation;
        /* 允许用户选择及输入 */
        -webkit-user-select: text;
        user-select: text;
      }

      /* 占位符文本样式 */
      input::placeholder,
      textarea::placeholder {
        font-size: 16px;
      }

      /* 防止 iOS 中输入框获焦时的默认蓝色边框 */
      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
      }
    </style>
    <title>Wynn Global</title>
  </head>
  <body>
    <!-- 独立的 Loading 页面容器 -->
    <div id="loading-overlay">
      <div id="loading-container">
        <div id="loading-logo">
          <img src="/plugins/loading/logo_heng.png" alt="logo" />
        </div>
        <div id="loading-spinner">
          <div id="loading-progress">
            <img id="loading-progress-img" src="/plugins/loading/jindu.png" alt="" />
          </div>
        </div>
      </div>
    </div>

    <!-- SVG 精灵图容器 - 由 vite-plugin-svg-icons 虚拟模块注入 -->
    <svg id="__svg__icons__dom__" style="display: none"></svg>

    <div id="app"></div>

    <!-- 加载进度脚本（在 main.ts 之前执行） -->
    <script src="/plugins/loading/loading.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
